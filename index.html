<div class="lyric">
  是不是只能透過雙手 愛才會有交直流<br>
  我 也找不到夠堅強的插座<br><br>
  看天空裡浮雲悠遊 羨煞了我的不自由<br>
  我站在窗口 我蹲在角落 聽你的流動<br><br>
  誰說 學不了微風 過眼從山間飛過<br>
  看 耳邊的窩 堆成泡沫<br>
  嚥了下一口 就放出彩虹 落在我胸口<br><br>
  跳動的世界裡找你的頻率<br>
  靜止也不休息 抓住你的呼吸<br>
  我 再多說一句 猜你的回應<br>
